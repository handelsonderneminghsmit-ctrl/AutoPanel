<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPanel — Smart Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════════════════════════════════════════════════════
   THEMA & UI DEFINITIES (Gepersonaliseerd op jouw stijl)
════════════════════════════════════════════════════ */
:root {
  --bg:#0a0c12; --surface:#11141d; --surface2:#181c28;
  --border:#252a3a; --accent:#3d5eff; --text:#eef0f6; --text2:#7a82a0;
  --green:#10b981; --red:#ef4444; --yellow:#ffdb00;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; }

/* Layout */
.app-wrapper { display: flex; min-height: 100vh; }
aside { width: 280px; background: var(--surface); border-right: 1px solid var(--border); padding: 2rem; position: sticky; top: 0; height: 100vh; }
main { flex: 1; padding: 2.5rem; max-width: 1400px; margin: 0 auto; width: 100%; }

/* Kenteken Stijl */
.plate {
    background: var(--yellow); color: #000; font-family: 'DM Mono', monospace;
    font-weight: 700; padding: 6px 12px; border-radius: 6px; border: 2px solid #000;
    display: inline-block; text-transform: uppercase; letter-spacing: 1px;
}

/* Navigatie */
nav ul { list-style: none; margin-top: 3rem; }
nav li { 
    padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; cursor: pointer;
    color: var(--text2); transition: 0.2s; display: flex; align-items: center; gap: 12px;
}
nav li:hover, nav li.active { background: var(--surface2); color: var(--text); }
nav li.active { border: 1px solid var(--border); color: var(--accent); }

/* UI Componenten */
.card { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }

.form-group { margin-bottom: 1.2rem; }
label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 6px; }
input, select { 
    width: 100%; background: var(--surface2); border: 1px solid var(--border); 
    padding: 12px; border-radius: 10px; color: white; font-family: inherit;
}
input:focus { border-color: var(--accent); outline: none; }

.btn { 
    padding: 12px 24px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

#toast {
    position: fixed; bottom: 30px; right: 30px; padding: 16px 24px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border); transform: translateY(150px);
    transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000;
}

/* Auth View */
#auth-view { display: flex; align-items: center; justify-content: center; height: 100vh; }
</style>
</head>
<body>

<div id="toast">Bericht...</div>

<div id="auth-view" style="display:none;">
    <div class="card" style="width: 400px; text-align: center;">
        <h2 style="font-family:'Syne'; margin-bottom: 2rem;">AutoPanel Login</h2>
        <button class="btn btn-primary" onclick="login()">Inloggen met Google / Email</button>
    </div>
</div>

<div id="app-view" class="app-wrapper">
    <aside>
        <h1 style="font-family:'Syne'; font-size: 1.5rem;">AutoPanel<span style="color:var(--accent)">.</span></h1>
        <nav>
            <ul>
                <li onclick="switchTab('voorraad')" id="tab-voorraad" class="active">📦 Voorraad</li>
                <li onclick="switchTab('inkoop')" id="tab-inkoop">💰 Nieuwe Inkoop</li>
                <li onclick="switchTab('admin')" id="tab-admin">🛡 Admin</li>
                <li onclick="logout()" style="margin-top: 5rem; color: var(--red);">Uitloggen</li>
            </ul>
        </nav>
    </aside>

    <main>
        <section id="sec-voorraad">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
                <h2>Actuele Voorraad</h2>
                <input type="text" id="search-bar" placeholder="Zoek op kenteken of merk..." style="width: 300px;">
            </div>
            <div id="inventory-grid" class="grid">
                </div>
        </section>

        <section id="sec-inkoop" style="display:none;">
            <h2>Nieuw Voertuig Inkopen</h2>
            <div class="card" style="max-width: 700px; margin-top: 2rem;">
                <div style="display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 2rem;">
                    <div style="flex: 1;">
                        <label>Kenteken</label>
                        <input type="text" id="in-kenteken" placeholder="Bijv. 12-ABC-3" style="font-size: 1.2rem; text-transform: uppercase;">
                    </div>
                    <button class="btn" style="background:var(--yellow); color:#000; height: 48px;" onclick="rdwLookup()">RDW Check</button>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group"><label>Merk</label><input type="text" id="in-merk"></div>
                    <div class="form-group"><label>Model</label><input type="text" id="in-model"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group"><label>Inkoopprijs (€)</label><input type="number" id="in-inkoop"></div>
                    <div class="form-group"><label>Verkoopprijs (€)</label><input type="number" id="in-verkoop"></div>
                </div>

                <div class="form-group">
                    <label>Btw/Marge</label>
                    <select id="in-regime">
                        <option value="true">Marge (Geen BTW)</option>
                        <option value="false">BTW Voertuig</option>
                    </select>
                </div>

                <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="saveVehicle()">Opslaan in Voorraad</button>
            </div>
        </section>

        <section id="sec-admin" style="display:none;">
            <h2>Systeembeheer</h2>
            <div class="card" id="admin-content" style="margin-top: 2rem;">
                Toegang beperkt tot administrators.
            </div>
        </section>
    </main>
</div>

<script>
// INITIALISATIE SUPABASE (VUL JE EIGEN GEGEVENS IN!)
const SB_URL = "https://ysnsiidgpvnaiasapzjg.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbnNpaWRncHZuYWlhc2FwempnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzk1MjksImV4cCI6MjA4ODc1NTUyOX0.UVS5EUhrlJznIYkG5pF-SDb2EaEo2qL1FsYgcXuN2yc";
const sb = supabase.createClient(SB_URL, SB_KEY);

// TAB LOGICA
function switchTab(tabId) {
    document.querySelectorAll('main section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
    document.getElementById('sec-' + tabId).style.display = 'block';
    document.getElementById('tab-' + tabId).classList.add('active');
    if(tabId === 'voorraad') loadInventory();
}

// TOAST
function toast(m, c = 'var(--accent)') {
    const t = document.getElementById('toast');
    t.innerText = m; t.style.borderColor = c;
    t.style.transform = 'translateY(0)';
    setTimeout(() => t.style.transform = 'translateY(150px)', 3000);
}

// RDW API
async function rdwLookup() {
    const k = document.getElementById('in-kenteken').value.replace(/-/g,'').toUpperCase();
    if(k.length < 6) return toast("Ongeldig kenteken", "var(--red)");
    
    toast("RDW raadplegen...");
    try {
        const res = await fetch(`https://opendata.rdw.nl/resource/m9gs-pjhk.json?kenteken=${k}`);
        const data = await res.json();
        if(data.length > 0) {
            document.getElementById('in-merk').value = data[0].merk;
            document.getElementById('in-model').value = data[0].handelsbenaming;
            toast("Data opgehaald!", "var(--green)");
        }
    } catch(e) { toast("RDW Error", "var(--red)"); }
}

// OPSLAAN
async function saveVehicle() {
    const { data: { user } } = await sb.auth.getUser();
    const car = {
        owner_id: user.id,
        kenteken: document.getElementById('in-kenteken').value,
        merk: document.getElementById('in-merk').value,
        model: document.getElementById('in-model').value,
        inkoopprijs: document.getElementById('in-inkoop').value,
        verkoopprijs: document.getElementById('in-verkoop').value,
        marge_auto: document.getElementById('in-regime').value === 'true'
    };

    const { error } = await sb.from('vehicles').insert(car);
    if(!error) {
        toast("Auto toegevoegd!", "var(--green)");
        switchTab('voorraad');
    } else {
        toast("Fout: " + error.message, "var(--red)");
    }
}

// LADEN
async function loadInventory() {
    const grid = document.getElementById('inventory-grid');
    grid.innerHTML = "Laden...";
    const { data, error } = await sb.from('vehicles').select('*').order('created_at', {ascending:false});
    
    if(data) {
        grid.innerHTML = data.map(v => `
            <div class="card">
                <span class="plate">${v.kenteken}</span>
                <h3 style="margin: 1rem 0 0.5rem 0">${v.merk} ${v.model}</h3>
                <p style="color:var(--text2); font-size:0.9rem;">Status: ${v.status}</p>
                <div style="margin-top:1.5rem; font-weight:700; font-size:1.2rem; color:var(--green)">
                    € ${parseFloat(v.verkoopprijs).toLocaleString('nl-NL')}
                </div>
            </div>
        `).join('');
    }
}

// Start
window.onload = () => loadInventory();
</script>
</body>
</html>
